packaging_format = 2

id = "scrutiny"
name = "Scrutiny"
description.en = "WebUI for smartd S.M.A.R.T monitoring"

version = "0.9.2~ynh1"

maintainers = ["ewilly"]

[upstream]
license = "MIT"
admindoc = "https://github.com/AnalogJ/scrutiny/tree/master/docs"
code = "https://github.com/AnalogJ/scrutiny"
fund = "https://paypal.me/analogj/usd10"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false
ldap = "not_relevant"
sso = "not_relevant"
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
	[install.domain]
	type = "domain"

	[install.path]
	type = "path"
	default = "/scrutiny"

	[install.collector]
	ask.en = "Should the collector be activated on this host?"
	help.en = "Let it to true if yunohost is running on bare metal (i.e. not in a VM or in a LXC)"
	type = "boolean"
	default = true

[resources]
	[resources.sources]

		[resources.sources.main]
		in_subdir = false
		rename = "scrutiny-web-linux"
		amd64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.2/scrutiny-web-linux-amd64"
		amd64.sha256 = "9992f3156b72176664f384acc8969e8449542fc328e40634d24b51e2758f2564"
		arm64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.2/scrutiny-web-linux-arm64"
		arm64.sha256 = "f2e11f6e75b467e1f2134413cb100d044634350552d57c7fb5ca85dcc2feaab4"

		autoupdate.strategy = "latest_github_release"
		autoupdate.asset.amd64 = "^scrutiny-web-linux-amd64$"
		autoupdate.asset.arm64 = "^scrutiny-web-linux-arm64$"

		[resources.sources.scrutiny-collector-metrics-linux]
		in_subdir = false
		rename = "scrutiny-collector-metrics-linux"
		amd64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.2/scrutiny-collector-metrics-linux-amd64"
		amd64.sha256 = "a8f0c8efe23afbae07957fe7ebd29ed6b3aecdf40bc00cc300c042b77b80c851"
		arm64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.2/scrutiny-collector-metrics-linux-arm64"
		arm64.sha256 = "ba1069197a2c72c33bfe02c2d137724fac694e2e03982179666c4f522514de53"

		autoupdate.strategy = "latest_github_release"
		autoupdate.asset.amd64 = "^scrutiny-collector-metrics-linux-amd64$"
		autoupdate.asset.arm64 = "^scrutiny-collector-metrics-linux-arm64$"

		[resources.sources.scrutiny-web-frontend]
		in_subdir = true
		url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.2/scrutiny-web-frontend.tar.gz"
		sha256 = "8808067b87d75e6190cdc2bb4818976a309254c14869b9af3dba36f2bc1bc1f5"

		autoupdate.strategy = "latest_github_release"
		autoupdate.asset = "^scrutiny-web-frontend.tar.gz$"

	[resources.system_user]

	[resources.install_dir]

	[resources.data_dir]

	[resources.permissions]
	main.url = "/"
	main.auth_header = false
	main.show_tile = true
	main.protected= true
	main.allowed = "admins"
	api.url = "re:__DOMAIN____PATH__/api/devices?/.*"
	api.allowed = "visitors"
	api.auth_header = false
	api.show_tile = false
	api.protected= true

	[resources.ports]
	main.default = 8080

	[resources.apt]
	packages = "smartmontools"
