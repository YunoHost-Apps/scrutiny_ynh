packaging_format = 2

id = "scrutiny"
name = "Scrutiny"
description.en = "WebUI for smartd S.M.A.R.T monitoring"

version = "0.9.0~ynh1"

maintainers = ["ewilly"]

[upstream]
license = "MIT"
admindoc = "https://github.com/AnalogJ/scrutiny/tree/master/docs"
code = "https://github.com/AnalogJ/scrutiny"
fund = "https://paypal.me/analogj/usd10"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false
ldap = "not_relevant"
sso = "not_relevant"
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/scrutiny"
    
    [install.collector]
    ask.en = "Should the collector be activated on this host?"
    help.en = "Let it to true if yunohost is running on bare metal (i.e. not in a VM or in a LXC)"
    type = "boolean"
    default = true

[resources]
    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        rename = "scrutiny-web-linux"
        amd64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.0/scrutiny-web-linux-amd64"
        amd64.sha256 = "be8563aa3bea9a902c6280f31fe4b1135d2d5825600016fc8db4c9a8fee99159"
        arm64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.0/scrutiny-web-linux-arm64"
        arm64.sha256 = "44d43df8a23af9846734a5b6517d74c40341873c1515fc6d3e1c5424dc471fef"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^scrutiny-web-linux-amd64$"
        autoupdate.asset.arm64 = "^scrutiny-web-linux-arm64$"

        [resources.sources.scrutiny-collector-metrics-linux]
        in_subdir = false
        rename = "scrutiny-collector-metrics-linux"
        amd64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.0/scrutiny-collector-metrics-linux-amd64"
        amd64.sha256 = "5da67b20797111b05ddfb0ebabcb3a602f9e9f77cadd5b13fa313c51f0d6faf5"
        arm64.url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.0/scrutiny-collector-metrics-linux-arm64"
        arm64.sha256 = "c957ad6c10683bfc1f9a14c4671b02385cd4400488d39ac8ab4714ae7a93ca23"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^scrutiny-collector-metrics-linux-amd64$"
        autoupdate.asset.arm64 = "^scrutiny-collector-metrics-linux-arm64$"

        [resources.sources.scrutiny-web-frontend]
        in_subdir = true
        url = "https://github.com/AnalogJ/scrutiny/releases/download/v0.9.0/scrutiny-web-frontend.tar.gz"
        sha256 = "d02569c88fb1d2f22c3190243fc73585383a711a9922e5a1cf4a53c459911171"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset = "^scrutiny-web-frontend.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false
    main.show_tile = true
    main.protected= true
    main.allowed = "admins"
    api.url = "/api"
    api.auth_header = false
    api.show_tile = false
    api.protected= true
    api.allowed = ["visitors", "all_users"]

    [resources.ports]
    main.default = 8080

    [resources.apt]
    packages = "smartmontools"
